name: Bug report
description: Report a reproducible problem in the maintained package, tests or benchmark.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve the project. Please remove private data and credentials before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include the smallest command or code sample that reproduces the problem.
      render: shell
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Paste the complete relevant traceback or CI output.
      render: text
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04, macOS 15, Windows 11"
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Relevant package versions
      description: Include pandas, NumPy, scikit-learn and statsmodels versions when applicable.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed credentials and private data.
          required: true
        - label: The reproduction preserves chronological ordering.
          required: true
