name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e '.[classical,dev]'
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest
      - name: Run open dataset benchmarks
        run: |
          time-series-benchmark \
            --output benchmark_results.csv \
            --leaderboard generated/BENCHMARK_LEADERBOARD.md
          grep -q "## Overall leaderboard" generated/BENCHMARK_LEADERBOARD.md
          grep -q "## co2" generated/BENCHMARK_LEADERBOARD.md
          grep -q "## real_gdp" generated/BENCHMARK_LEADERBOARD.md
          grep -q "## sunspots" generated/BENCHMARK_LEADERBOARD.md
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-leaderboard-py${{ matrix.python-version }}
          path: |
            benchmark_results.csv
            generated/BENCHMARK_LEADERBOARD.md
